<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EUICCI Premium Preview</title>
<style>
:root {
  --navy:#0f2740; --blue:#1b4f8a; --gold:#e0b24d; --ink:#16202a; --muted:#576575;
  --shadow:0 14px 40px rgba(16,32,56,.10); --max:1220px;
}
* { box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  margin:0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  color:var(--ink); background:linear-gradient(180deg,#f7fbff 0%,#fff 35%,#fff8ef 100%);
}
a { color:inherit; text-decoration:none; }
.container { width:min(var(--max), calc(100% - 32px)); margin:0 auto; }
.topbar {
  position:sticky; top:0; z-index:20; backdrop-filter: blur(10px);
  background:rgba(255,255,255,.78); border-bottom:1px solid rgba(15,39,64,.08);
}
.topbar-inner { display:flex; align-items:center; justify-content:space-between; gap:20px; padding:14px 0; }
.brand { display:flex; gap:14px; align-items:center; }
.badge {
  width:48px; height:48px; border-radius:16px; display:grid; place-items:center;
  background:linear-gradient(135deg,var(--navy),var(--blue)); color:#fff; font-weight:800; box-shadow:var(--shadow);
}
.brand h1 { margin:0; font-size:18px; line-height:1.15; }
.brand p { margin:2px 0 0; color:var(--muted); font-size:13px; }
.lang-switch { display:flex; gap:10px; }
.lang-switch button {
  border:1px solid rgba(15,39,64,.12); background:#fff; padding:10px 14px; border-radius:999px;
  font-weight:700; cursor:pointer;
}
.lang-switch button.active { background:var(--navy); color:#fff; border-color:var(--navy); }
.hero { padding:58px 0 28px; }
.hero-grid { display:grid; grid-template-columns:1.2fr .8fr; gap:22px; align-items:stretch; }
.panel { background:#fff; border-radius:28px; box-shadow:var(--shadow); overflow:hidden; }
.hero-main {
  padding:34px; position:relative; background:
    radial-gradient(circle at top right, rgba(224,178,77,.25), transparent 30%),
    linear-gradient(135deg,#ffffff 0%, #eef5ff 58%, #fff8ed 100%);
}
.eyebrow {
  display:inline-flex; gap:10px; align-items:center; background:#eef5ff; color:var(--blue);
  padding:10px 14px; border-radius:999px; font-size:13px; font-weight:700;
}
.hero h2 { font-size:54px; line-height:1.02; margin:18px 0 16px; max-width:12ch; }
.hero p.lead { font-size:18px; line-height:1.75; color:#304254; max-width:62ch; }
.cta-row { display:flex; gap:12px; flex-wrap:wrap; margin-top:24px; }
.btn { padding:14px 18px; border-radius:14px; font-weight:800; display:inline-block; }
.btn-primary { background:var(--navy); color:#fff; }
.btn-secondary { background:#fff; color:var(--navy); border:1px solid rgba(15,39,64,.10); }
.hero-side { display:grid; gap:16px; }
.side-card { border-radius:28px; padding:24px; box-shadow:var(--shadow); background:#fff; }
.side-card.navy { background:linear-gradient(135deg,var(--navy),#15375b); color:#fff; }
.side-card.gold { background:linear-gradient(135deg,#fffaf0,#fff); }
.stats { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:14px; }
.stat {
  background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.14);
  border-radius:18px; padding:14px;
}
.stat strong { display:block; font-size:20px; }
.section { padding:22px 0; }
.section-head { display:flex; justify-content:space-between; gap:20px; align-items:end; margin-bottom:18px; }
.section-head h3 { font-size:34px; margin:0; }
.section-head p { margin:0; color:var(--muted); max-width:60ch; line-height:1.7; }
.grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:18px; }
.grid-2 { display:grid; grid-template-columns:repeat(2,1fr); gap:18px; }
.card { background:#fff; border-radius:24px; box-shadow:var(--shadow); padding:24px; height:100%; }
.card h4 { margin:0 0 10px; font-size:22px; }
.card p, .card li { color:#405163; line-height:1.75; }
.card.blue { background:linear-gradient(180deg,#eef5ff 0,#fff 100%); }
.card.gold { background:linear-gradient(180deg,#fff8ed 0,#fff 100%); }
.card.green { background:linear-gradient(180deg,#eefbf4 0,#fff 100%); }
.card.rose { background:linear-gradient(180deg,#fff2f0 0,#fff 100%); }
.card.violet { background:linear-gradient(180deg,#f5f1ff 0,#fff 100%); }
.band { border-radius:28px; padding:28px; box-shadow:var(--shadow); background:#fff; }
.band.navy { background:linear-gradient(135deg,var(--navy),#163a60); color:#fff; }
.band.navy p, .band.navy li { color:rgba(255,255,255,.88); }
.offer-list { display:grid; grid-template-columns:repeat(2,1fr); gap:12px 18px; padding:0; list-style:none; margin:18px 0 0; }
.offer-list li { background:#fff; border-radius:16px; padding:14px 16px; box-shadow:0 8px 20px rgba(16,32,56,.06); }
.timeline { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
.step { background:#fff; border-radius:22px; padding:18px; box-shadow:var(--shadow); }
.step .num { width:34px; height:34px; border-radius:10px; background:var(--navy); color:#fff; display:grid; place-items:center; font-weight:800; margin-bottom:10px; }
.leadership { display:grid; grid-template-columns:.72fr 1.28fr; gap:18px; }
.portrait { background:linear-gradient(135deg,#eef5ff,#fff9ef); border-radius:28px; padding:18px; box-shadow:var(--shadow); }
.portrait img { width:100%; border-radius:20px; display:block; aspect-ratio:4/5; object-fit:cover; background:#dfe7ef; }
.footer { margin-top:28px; padding:34px 0 50px; }
.footer-wrap { background:linear-gradient(135deg,var(--navy),#16365a); color:#fff; border-radius:30px; box-shadow:var(--shadow); padding:28px; }
.footer-grid { display:grid; grid-template-columns:1.2fr .8fr; gap:18px; }
.small { font-size:14px; color:var(--muted); }
[data-lang] { display:none; }
[data-lang].active { display:block; }
@media (max-width: 980px) {
  .hero-grid, .grid-3, .grid-2, .leadership, .footer-grid, .timeline { grid-template-columns:1fr; }
  .hero h2 { font-size:40px; max-width:none; }
  .offer-list { grid-template-columns:1fr; }
}
</style>
</head>

      <div class="card green"><h4>${data.site.location}</h4><p>${data.site.tagline}</p></div>
    </div>
  </section>

  <section class="section">
    <div class="section-head">
      <h3>${data.why.title}</h3>
      <p>${data.services.intro}</p>
    </div>
    <div class="grid-3">
      ${data.why.items.map((it, idx) => `<div class="card ${whyClasses[idx % whyClasses.length]}"><h4>${it.title}</h4><p>${it.text}</p></div>`).join('')}
    </div>
  </section>

  <section class="section" id="services">
    <div class="section-head">
      <h3>${data.services.title}</h3>
      <p>${data.services.intro}</p>
    </div>
    <div class="grid-3">
      ${data.services.cards.map((c, idx) => `<div class="card ${serviceClasses[idx % serviceClasses.length]}"><h4>${c.title}</h4><p>${c.text}</p></div>`).join('')}
    </div>
  </section>

  <section class="section">
    <div class="band">
      <div class="section-head" style="margin-bottom:10px;">
        <h3>${data.offers.title}</h3>
        <p>${data.partnerships.p2}</p>
      </div>
      <ul class="offer-list">
        ${data.offers.items.map(it => `<li>${it}</li>`).join('')}
      </ul>
    </div>
  </section>

  <section class="section">
    <div class="section-head">
      <h3>${data.sectors.title}</h3>
      <p>${data.events.p2}</p>
    </div>
    <div class="grid-3">
      ${data.sectors.cards.map((c, idx) => `<div class="card ${sectorClasses[idx % sectorClasses.length]}"><h4>${c.title}</h4><p>${c.text}</p></div>`).join('')}
    </div>
  </section>

  <section class="section">
    <div class="band navy">
      <div class="section-head" style="margin-bottom:10px;">
        <h3 style="color:#fff;">${data.advocacy.title}</h3>
        <p style="color:rgba(255,255,255,.88);">${data.advocacy.p1}</p>
      </div>
      <div class="grid-2">
        <div><p>${data.advocacy.p2}</p></div>
        <div><p>${data.advocacy.p3}</p></div>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="section-head">
      <h3>${data.tiers.title}</h3>
      <p>${data.membership.p2}</p>
    </div>
    <div class="grid-3">
      ${data.tiers.cards.map((c, idx) => `<div class="card ${tierClasses[idx % tierClasses.length]}"><h4>${c.title}</h4><p>${c.text}</p></div>`).join('')}
    </div>
  </section>

  <section class="section">
    <div class="grid-2">
      <div class="card rose">
        <h4>${data.membership.title}</h4>
        <p>${data.membership.p1}</p>
        <p>${data.membership.p2}</p>
        <p><strong>${data.membership.p3}</strong></p>
      </div>
      <div class="card violet">
        <h4>${data.partnerships.title}</h4>
        <p>${data.partnerships.p1}</p>
        <p>${data.partnerships.p2}</p>
        <p><strong>${data.partnerships.p3}</strong></p>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="section-head">
      <h3>${data.events.title}</h3>
      <p>${data.events.p1}</p>
    </div>
    <div class="timeline">
      <div class="step"><div class="num">1</div><h4 style="margin:0 0 8px;">Dialogue</h4><p>${data.events.p2}</p></div>
      <div class="step"><div class="num">2</div><h4 style="margin:0 0 8px;">Meetings</h4><p>${data.events.p3}</p></div>
      <div class="step"><div class="num">3</div><h4 style="margin:0 0 8px;">Introductions</h4><p>${data.services.cards[1].text}</p></div>
      <div class="step"><div class="num">4</div><h4 style="margin:0 0 8px;">Follow through</h4><p>${data.services.cards[4].text}</p></div>
    </div>
  </section>

  <section class="section">
    <div class="leadership">
      <div class="portrait">
        <img src="${data.leadership.image}" alt="${data.leadership.name}">
      </div>
      <div class="card">
        <div class="small">${data.leadership.title}</div>
        <h3 style="font-size:34px; margin:8px 0 4px;">${data.leadership.name}</h3>
        <p style="font-weight:700; margin-top:0;">${data.leadership.role}</p>
        <p>${data.leadership.bio1}</p>
        <p>${data.leadership.bio2}</p>
        <p>${data.leadership.bio3}</p>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="grid-2">
      <div class="card blue">
        <h4>${data.board.title}</h4>
        <p>${data.board.p1}</p>
        <p>${data.board.p2}</p>
        <p><strong>${data.board.placeholder}</strong></p>
      </div>
      <div class="card gold" id="contact">
        <h4>${data.contact.title}</h4>
        <p>${data.contact.text}</p>
        <p><strong>${data.contact.address}</strong></p>
        <p>${data.contact.email}<br>${data.contact.phone}</p>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-wrap">
      <div class="footer-grid">
        <div>
          <h3 style="margin-top:0;">${data.footer.line1}</h3>
          <p style="line-height:1.8; color:rgba(255,255,255,.88);">${data.site.tagline}<br>${data.footer.line2}</p>
        </div>
        <div>
          <p style="line-height:1.8; color:rgba(255,255,255,.88); margin:0;">${data.footer.line3}</p>
        </div>
      </div>
    </div>
  </footer>
  `;
}

document.getElementById('app-en').innerHTML = renderApp(en);
document.getElementById('app-fr').innerHTML = renderApp(fr);

function setBrand(data){
  document.getElementById('brandName').textContent = data.site.short + " | " + data.site.name;
  document.getElementById('brandTag').textContent = data.site.tagline;
}
function setLang(lang){
  document.querySelectorAll('[data-lang]').forEach(el => el.classList.remove('active'));
  document.getElementById('app-'+lang).classList.add('active');
  document.getElementById('btn-en').classList.toggle('active', lang==='en');
  document.getElementById('btn-fr').classList.toggle('active', lang==='fr');
  setBrand(lang==='en' ? en : fr);
}
setBrand(en);
</script>
</body>
</html>
